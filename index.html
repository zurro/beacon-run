<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" />
  <meta http-equiv="refresh" content="0; url=wasteland-run.html" />
  <title>Beacon Runner</title>
  <style>
    :root{
      --cyan:#00ffd8;
      --bg:#0b1014;
      --text:#e8f7ff;
      --accent:#ffb84d;
      --panel:rgba(8,17,24,0.92);
    }
    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(60% 50% at 50% 20%, rgba(0,255,216,0.12), rgba(0,0,0,0) 60%),
        radial-gradient(50% 40% at 20% 80%, rgba(255,184,77,0.10), rgba(0,0,0,0) 55%),
        radial-gradient(40% 35% at 80% 80%, rgba(123,92,255,0.08), rgba(0,0,0,0) 55%);
      pointer-events:none;
    }
    main{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:24px;
      box-sizing:border-box;
      position:relative;
      z-index:1;
    }
    .shell{
      width:min(520px, 100%);
      padding:28px 24px;
      border:1px solid rgba(0,255,216,0.28);
      border-radius:22px;
      background:var(--panel);
      box-shadow:0 18px 60px rgba(0,0,0,0.42), 0 0 24px rgba(0,255,216,0.08);
      text-align:center;
    }
    .logo{
      width:min(280px, 78%);
      height:auto;
      display:block;
      margin:0 auto 18px;
      filter:drop-shadow(0 0 18px rgba(0,255,216,0.16));
    }
    .eyebrow{
      margin:0 0 8px;
      font-size:12px;
      letter-spacing:0.28em;
      text-transform:uppercase;
      color:rgba(0,255,216,0.72);
    }
    h1{
      margin:0;
      font-size:clamp(30px, 5vw, 44px);
      line-height:1;
    }
    p{
      margin:14px 0 0;
      color:rgba(232,247,255,0.76);
      line-height:1.55;
    }
    .actions{
      margin-top:22px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }
    .action{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:150px;
      padding:10px 14px;
      border-radius:12px;
      text-decoration:none;
      font-size:14px;
      font-weight:700;
      border:1px solid rgba(0,255,216,0.35);
      color:var(--text);
      background:rgba(255,255,255,0.04);
    }
    .action.primary{
      border-color:rgba(255,184,77,0.42);
      color:#081118;
      background:linear-gradient(135deg, #ffcf78, #ff9f43);
    }
  </style>
</head>
<body>
  <main>
    <section class="shell" aria-labelledby="redirectTitle">
      <img class="logo" src="assets/beaconrun.png" alt="Beacon Runner" />
      <p class="eyebrow">Default Experience</p>
      <h1 id="redirectTitle">Entering Wasteland Mode</h1>
      <p>Beacon Runner now opens in Wasteland Mode by default. If the redirect does not happen automatically, you can launch Wasteland or jump back to Classic Mode, the original arcade branch.</p>
      <div class="actions">
        <a class="action primary" href="wasteland-run.html">Open Wasteland Mode</a>
        <a class="action" href="classic.html">Open Classic Mode</a>
        <a class="action" href="scorecard.html">Open Scores</a>
      </div>
    </section>
  </main>
</body>
</html>
