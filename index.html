<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" />
  <title>Beacon Runner</title>
  <style>
    :root{ --cyan:#00ffd8; --bg:#0b1014; --text:#e8f7ff; --accent:#ffb84d; }
    html,body{ height:100%; margin:0; background:var(--bg); font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; overscroll-behavior: none; touch-action: none; }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(60% 50% at 50% 20%, rgba(0,255,216,0.12), rgba(0,0,0,0) 60%),
        radial-gradient(50% 40% at 20% 80%, rgba(255,184,77,0.10), rgba(0,0,0,0) 55%),
        radial-gradient(40% 35% at 80% 80%, rgba(123,92,255,0.10), rgba(0,0,0,0) 55%);
      pointer-events:none;
      z-index:0;
    }
    .wrap{ height:100%; display:flex; align-items:center; justify-content:center; padding:12px; box-sizing:border-box; position:relative; z-index:1; }
    #game{
      width:min(100vw, calc(100vh * 0.6));
      height:auto;
      aspect-ratio: 480 / 800;
      max-height: 100vh;
      border:2px solid rgba(0,255,216,.55);
      box-shadow:0 0 32px rgba(0,255,216,.18);
      background:#081118;
      touch-action: none;
    }
    .controls{ position:fixed; inset:0; pointer-events:none; z-index:2; }
    .toggles{
      position:fixed; right:12px; top:12px; display:flex; gap:8px; pointer-events:auto;
    }
    .toggle-btn{
      background:rgba(8,17,24,0.8); color:rgba(232,247,255,0.9); border:1px solid rgba(0,255,216,.35);
      border-radius:10px; padding:6px 10px; font-size:12px; cursor:pointer;
      backdrop-filter: blur(6px);
    }
    .touch-pad{
      position:fixed; bottom:18px; left:50%; transform:translateX(-50%); display:none;
      gap:12px; pointer-events:auto;
    }
    .touch-btn{
      width:64px; height:64px; border-radius:16px; border:1px solid rgba(0,255,216,.4);
      background:rgba(8,17,24,0.7); color:rgba(232,247,255,.9); font-size:18px; font-weight:700;
    }
    .touch-row{ display:flex; gap:12px; justify-content:center; }
    .hud{ position:fixed; inset:0; pointer-events:none; display:flex; justify-content:center; }
    .hint{ position:absolute; bottom:10px; color:rgba(232,247,255,.75); font-size:12px; text-align:center; width:min(520px,92vw); line-height:1.35; }
    .badge{ display:inline-block; padding:2px 8px; border:1px solid rgba(0,255,216,.45); border-radius:999px; margin:0 4px; }

    @media (orientation: landscape){
      .wrap{ flex-direction:row; gap:16px; padding:16px; }
      #game{
        width:min(70vw, calc(100vh * 0.75));
        max-height: 92vh;
      }
      .hud{ position:fixed; }
      .hint{
        position:fixed;
        right:16px;
        bottom:16px;
        width:240px;
        text-align:left;
        background:rgba(0,0,0,0.35);
        padding:8px 10px;
        border-radius:10px;
        border:1px solid rgba(0,255,216,.25);
      }
    }

    @media (pointer: coarse){
      .touch-pad{ display:flex; flex-direction:column; }
      .toggles{ top:10px; right:10px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="480" height="800" aria-label="Infinite runner game"></canvas>
  </div>
  <div class="controls">
    <div class="toggles">
      <button id="muteBtn" class="toggle-btn" type="button">Sound: On</button>
      <button id="hapticsBtn" class="toggle-btn" type="button">Haptics: On</button>
      <button id="fpsBtn" class="toggle-btn" type="button">FPS: 60</button>
    </div>
    <div class="touch-pad" aria-hidden="true">
      <div class="touch-row">
        <button class="touch-btn" data-action="left" type="button">◀</button>
        <button class="touch-btn" data-action="right" type="button">▶</button>
      </div>
      <div class="touch-row">
        <button class="touch-btn" data-action="jump" type="button">⤒</button>
        <button class="touch-btn" data-action="slide" type="button">⤓</button>
      </div>
    </div>
  </div>
  <div class="hud">
    <div class="hint">
      <span class="badge">←/→</span> change lanes &nbsp; <span class="badge">↑</span> jump &nbsp; <span class="badge">↓</span> slide &nbsp; <span class="badge">Space</span> pause<br/>
      On mobile: swipe left/right/up/down
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
