<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" />
  <title>Beacon Runner</title>
  <style>
    :root{
      --cyan:#00ffd8;
      --bg:#0b1014;
      --text:#e8f7ff;
      --muted:rgba(232,247,255,0.7);
      --accent:#ffb84d;
      --danger:#ff7c5a;
      --panel:rgba(8,17,24,0.88);
      --panel-border:rgba(0,255,216,.26);
      --safe-top:max(10px, env(safe-area-inset-top));
      --safe-right:max(10px, env(safe-area-inset-right));
      --safe-bottom:max(10px, env(safe-area-inset-bottom));
      --safe-left:max(10px, env(safe-area-inset-left));
      --app-height:100svh;
      --font-body:"Bahnschrift","Trebuchet MS","Segoe UI",Arial,sans-serif;
      --font-display:"Bahnschrift","Arial Narrow","Trebuchet MS","Segoe UI",Arial,sans-serif;
      --font-mono:"Consolas","Courier New",monospace;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; min-height:100%; margin:0; background:var(--bg); color:var(--text); font-family:var(--font-body); overscroll-behavior:none; overflow:hidden; touch-action:none; }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(60% 50% at 50% 20%, rgba(0,255,216,0.12), rgba(0,0,0,0) 60%),
        radial-gradient(50% 40% at 20% 80%, rgba(255,184,77,0.10), rgba(0,0,0,0) 55%),
        radial-gradient(40% 35% at 80% 80%, rgba(123,92,255,0.10), rgba(0,0,0,0) 55%);
      pointer-events:none;
    }
    .page{
      position:relative;
      z-index:1;
      min-height:var(--app-height);
      display:block;
      padding:0;
    }
    .topbar{
      position:fixed;
      top:var(--safe-top);
      left:0;
      right:0;
      z-index:4;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:8px;
      padding:0 max(12px, var(--safe-right)) 0 max(12px, var(--safe-left));
      pointer-events:none;
      transition:opacity .2s ease;
    }
    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:flex-end;
      pointer-events:auto;
      max-width:min(100%, 920px);
    }
    .action{
      min-height:38px;
      padding:0 12px;
      border-radius:10px;
      border:1px solid rgba(0,255,216,.35);
      background:rgba(8,17,24,0.8);
      color:rgba(232,247,255,0.9);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      text-transform:uppercase;
      letter-spacing:.08em;
      white-space:nowrap;
      pointer-events:auto;
      backdrop-filter:blur(6px);
      font-family:var(--font-display);
    }
    .action.primary{ background:linear-gradient(135deg, rgba(0,255,216,.18), rgba(0,255,216,.08)); }
    .layout{ display:block; min-height:var(--app-height); }
    .stage{
      position:relative;
      overflow:hidden;
      border-radius:0;
      border:none;
      background:#081118;
      box-shadow:none;
      min-height:var(--app-height);
      height:var(--app-height);
    }
    #runCanvas{ width:100%; height:100%; display:block; background:#081118; }
    .touch-pad{
      position:absolute;
      left:50%;
      bottom:var(--safe-bottom);
      transform:translateX(-50%);
      z-index:3;
      display:none;
      grid-template-columns:repeat(3, 72px);
      gap:10px;
      pointer-events:auto;
    }
    .touch-btn{
      width:72px;
      height:72px;
      border-radius:16px;
      border:1px solid rgba(0,255,216,.4);
      background:rgba(8,17,24,0.7);
      backdrop-filter:blur(6px);
      color:rgba(232,247,255,.9);
      font-size:18px;
      font-weight:800;
      text-transform:uppercase;
      font-family:var(--font-display);
    }
    .hud{ position:fixed; inset:0; pointer-events:none; display:flex; justify-content:center; z-index:3; }
    .hint{
      position:absolute;
      bottom:10px;
      color:rgba(232,247,255,.75);
      font-size:12px;
      text-align:center;
      width:min(560px,92vw);
      line-height:1.35;
      padding:8px 10px;
      background:rgba(0,0,0,0.28);
      border:1px solid rgba(0,255,216,.18);
      border-radius:10px;
      backdrop-filter:blur(6px);
    }
    .badge{
      display:inline-block;
      padding:2px 8px;
      border:1px solid rgba(0,255,216,.45);
      border-radius:999px;
      margin:0 4px;
      font-family:var(--font-display);
    }
    .score-modal{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:5;
      background:rgba(2,7,10,0.6);
      backdrop-filter:blur(8px);
    }
    .score-modal[hidden]{ display:none; }
    .score-shell{
      width:min(440px, 92vw);
      max-height:min(760px, 92vh);
      overflow:visible;
      position:relative;
      pointer-events:auto;
      background:linear-gradient(180deg, rgba(11,22,28,0.95), rgba(5,12,16,0.96));
      border:1px solid rgba(0,255,216,.28);
      border-radius:22px;
      box-shadow:0 18px 60px rgba(0,0,0,.42), 0 0 30px rgba(0,255,216,.08);
      padding:22px 22px 18px;
      color:var(--text);
    }
    .score-kicker{ margin:0 0 8px; font-size:11px; letter-spacing:.28em; text-transform:uppercase; color:rgba(0,255,216,.7); font-family:var(--font-display); }
    .score-art{
      display:block;
      width:min(188px, 52vw);
      height:auto;
      margin:0 auto 14px;
      filter:drop-shadow(0 10px 28px rgba(0,0,0,.34));
    }
    .score-title{ margin:0; font-size:34px; line-height:1; font-weight:800; letter-spacing:.04em; font-family:var(--font-display); }
    .score-subtitle{ margin:10px 0 0; color:rgba(232,247,255,.72); font-size:14px; line-height:1.45; }
    .score-final{ display:flex; align-items:end; justify-content:space-between; gap:12px; margin:20px 0 14px; padding:14px 16px; border-radius:16px; background:rgba(255,255,255,.035); border:1px solid rgba(0,255,216,.14); }
    .score-final-label{ margin:0; font-size:11px; letter-spacing:.24em; text-transform:uppercase; color:rgba(232,247,255,.62); font-family:var(--font-display); }
    .score-final-value{ margin:4px 0 0; font-size:38px; line-height:1; font-weight:800; color:var(--accent); font-family:var(--font-display); }
    .score-status{ font-size:12px; color:rgba(0,255,216,.76); text-align:right; font-family:var(--font-display); }
    .score-entry{ margin:0 0 18px; }
    .score-entry[hidden]{ display:none; }
    .score-entry-label{ display:block; font-size:12px; text-transform:uppercase; letter-spacing:.18em; color:rgba(232,247,255,.7); margin-bottom:10px; font-family:var(--font-display); }
    .score-entry-input{
      width:100%;
      box-sizing:border-box;
      border-radius:14px;
      border:1px solid rgba(0,255,216,.28);
      background:rgba(2,10,13,.86);
      color:var(--text);
      padding:14px 16px;
      font:700 28px/1.1 var(--font-mono);
      letter-spacing:.32em;
      text-transform:uppercase;
      outline:none;
    }
    .score-entry-input:focus{ border-color:rgba(0,255,216,.55); box-shadow:0 0 0 3px rgba(0,255,216,.12); }
    .score-entry-hint{ margin:8px 0 0; font-size:12px; color:rgba(232,247,255,.56); }
    .score-list-wrap{ margin-top:10px; }
    .score-list-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px; }
    .score-list-title{ margin:0; font-size:13px; letter-spacing:.16em; text-transform:uppercase; color:rgba(232,247,255,.72); font-family:var(--font-display); }
    .score-list-note{ font-size:12px; color:rgba(232,247,255,.5); }
    .score-list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px; }
    .score-row{ display:grid; grid-template-columns:32px 1fr auto; align-items:center; gap:12px; padding:10px 12px; border-radius:14px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.05); font-family:var(--font-mono); }
    .score-row.is-pending{ border-color:rgba(255,184,77,.45); background:rgba(255,184,77,.08); }
    .score-rank{ color:rgba(232,247,255,.54); font-size:12px; }
    .score-name{ font-size:18px; letter-spacing:.18em; color:rgba(232,247,255,.92); }
    .score-value{ font-size:17px; color:rgba(0,255,216,.88); }
    .score-actions{ display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:10px; margin-top:18px; position:relative; z-index:2; pointer-events:auto; }
    .score-action{ min-width:0; min-height:44px; border-radius:14px; border:1px solid rgba(0,255,216,.28); background:rgba(8,17,24,.76); color:var(--text); text-decoration:none; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; padding:0 14px; font-size:13px; font-weight:700; pointer-events:auto; text-align:center; font-family:var(--font-display); }
    .score-action.primary{ background:linear-gradient(135deg, rgba(0,255,216,.18), rgba(0,255,216,.08)); }
    .score-action:disabled{ opacity:.45; cursor:not-allowed; }
    .score-actions .score-action:last-child{ grid-column:1 / -1; }
    .score-modal.entry-active .score-shell{ padding:18px 18px 16px; }
    .score-modal.entry-active .score-art{ width:min(128px, 34vw); margin:0 auto 10px; }
    .score-modal.entry-active .score-subtitle{ margin-top:8px; font-size:13px; line-height:1.35; }
    .score-modal.entry-active .score-final{ margin:14px 0 10px; padding:10px 12px; }
    .score-modal.entry-active .score-final-value{ font-size:32px; }
    .score-modal.entry-active .score-status{ font-size:11px; }
    .score-modal.entry-active .score-entry{ margin:0 0 12px; }
    .score-modal.entry-active .score-entry-label{ margin-bottom:8px; }
    .score-modal.entry-active .score-entry-input{ padding:11px 14px; font-size:24px; letter-spacing:.22em; }
    .score-modal.entry-active .score-entry-hint{ margin-top:6px; font-size:11px; }
    .score-modal.entry-active .score-list-wrap{ margin-top:8px; }
    .score-modal.entry-active .score-list-head{ margin-bottom:8px; }
    .score-modal.entry-active .score-row{ padding:8px 10px; gap:10px; }
    .score-modal.entry-active .score-name{ font-size:16px; }
    .score-modal.entry-active .score-value{ font-size:15px; }
    .score-modal.entry-active .score-actions{ margin-top:12px; gap:8px; grid-template-columns:1fr; }
    .score-modal.entry-active .score-action{ min-height:40px; font-size:12px; padding:0 10px; }
    .score-modal.entry-active .score-actions .score-action:last-child{ grid-column:auto; }
    body[data-mode="menu"] .topbar{
      opacity:0.34;
    }
    body[data-mode="menu"] .topbar:hover,
    body[data-mode="menu"] .topbar:focus-within{
      opacity:1;
    }
    body[data-mode="playing"] .topbar{
      opacity:0.84;
    }
    body[data-mode="playing"] .topbar:hover,
    body[data-mode="playing"] .topbar:focus-within{
      opacity:1;
    }
    .hint{
      transition:opacity .2s ease, transform .2s ease;
    }
    body[data-mode="playing"] .hint{
      opacity:0;
      transform:translateY(10px);
    }
    body[data-mode="menu"] .hint,
    body[data-mode="paused"] .hint,
    body[data-mode="gameover"] .hint{
      opacity:1;
      transform:translateY(0);
    }
    @media (max-width: 980px){
      .hint{ width:min(480px,90vw); }
    }
    @media (max-width: 760px){
      .topbar{
        justify-content:center;
        left:var(--safe-left);
        right:var(--safe-right);
        padding:0;
      }
      .actions{
        width:100%;
        max-width:none;
        flex-wrap:nowrap;
        justify-content:flex-start;
        overflow-x:auto;
        gap:8px;
        padding:0 0 4px;
        -webkit-overflow-scrolling:touch;
        scrollbar-width:none;
        scroll-snap-type:x proximity;
      }
      .actions::-webkit-scrollbar{ display:none; }
      .action{
        flex:0 0 auto;
        min-height:38px;
        padding:0 10px;
        font-size:11px;
        scroll-snap-align:start;
      }
      body.show-touch .touch-pad{
        display:grid;
        grid-template-columns:repeat(3, minmax(58px, 18vw));
        gap:8px;
        bottom:calc(var(--safe-bottom) + 6px);
      }
      body.hide-touch .touch-pad{ display:none; }
      .touch-btn{
        width:clamp(58px, 18vw, 72px);
        height:clamp(58px, 18vw, 72px);
      }
      .hint{
        bottom:94px;
        width:min(92vw, 520px);
      }
    }
    @media (max-width: 620px){
      .hint{ display:none; }
      .action{ min-height:36px; }
    }
    @media (max-width: 560px){ .score-title{ font-size:28px; } .score-final-value{ font-size:32px; } .score-entry-input{ font-size:24px; letter-spacing:.24em; } .score-row{ grid-template-columns:28px 1fr auto; gap:10px; } .score-name{ font-size:16px; letter-spacing:.12em; } .score-value{ font-size:15px; } .score-actions{ grid-template-columns:1fr; } .score-actions .score-action:last-child{ grid-column:auto; } }
  </style>
</head>
<body class="hide-touch">
  <main class="page">
    <header class="topbar">
      <div class="actions">
        <button id="startBtn" class="action primary" type="button">Start Run</button>
        <button id="pauseBtn" class="action" type="button">Pause</button>
        <button id="tutorialBtn" class="action" type="button">Tutorial</button>
        <button id="soundBtn" class="action" type="button">Sound: On</button>
        <button id="touchBtn" class="action" type="button">Controls: Off</button>
        <button id="difficultyBtn" class="action" type="button">Difficulty: Normal</button>
        <a class="action" href="scorecard.html">Scores</a>
      </div>
    </header>

    <section class="layout">
      <div class="stage">
        <canvas id="runCanvas" width="1280" height="760" aria-label="Beacon Runner game"></canvas>
        <div class="touch-pad" aria-hidden="true">
          <button class="touch-btn" data-action="left" type="button">◀</button>
          <button class="touch-btn" data-action="right" type="button">▶</button>
          <button class="touch-btn" data-action="jump" type="button">⤒</button>
        </div>
      </div>
    </section>
  </main>

  <div class="hud">
    <div class="hint">
      <span class="badge">←/→</span> move lanes &nbsp;
      <span class="badge">↑</span> jump hazards &nbsp;
      <span class="badge">Enter</span> start &nbsp;
      <span class="badge">Space</span> pause
    </div>
  </div>

  <div id="scoreModal" class="score-modal" hidden>
    <section class="score-shell" aria-labelledby="scoreModalTitle">
      <p class="score-kicker">Run Complete</p>
      <img class="score-art" src="assets/gameover.png" alt="" />
      <h2 id="scoreModalTitle" class="score-title">Scorecard</h2>
      <p id="scoreModalSubtitle" class="score-subtitle">Save your score if it made the board, or jump right back in.</p>
      <div class="score-final">
        <div>
          <p class="score-final-label">Final Score</p>
          <p id="scoreModalScore" class="score-final-value">0</p>
        </div>
        <div id="scoreModalStatus" class="score-status">Leaderboard</div>
      </div>
      <div id="scoreEntrySection" class="score-entry" hidden>
        <label class="score-entry-label" for="scoreNameInput">Enter your name</label>
        <input id="scoreNameInput" class="score-entry-input" type="text" inputmode="text" maxlength="6" autocomplete="off" spellcheck="false" placeholder="______" />
        <p id="scoreEntryHint" class="score-entry-hint">Use up to 6 letters. The list updates while you type.</p>
      </div>
      <div class="score-list-wrap">
        <div class="score-list-head">
          <h3 class="score-list-title">Top 10 Runs</h3>
          <span id="scoreListNote" class="score-list-note">This device</span>
        </div>
        <ol id="scoreList" class="score-list"></ol>
      </div>
      <div class="score-actions">
        <button id="saveScoreBtn" class="score-action primary" type="button">Save Score</button>
        <button id="retryBtn" class="score-action" type="button">Play Again</button>
        <a class="score-action" href="scorecard.html">Open Scorecard</a>
      </div>
    </section>
  </div>

  <script src="score-utils.js?v=20260420a"></script>
  <script src="dom-utils.js?v=20260420a"></script>
  <script src="game.js?v=20260420x"></script>
</body>
</html>
